<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Privacy Monitor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:370px;min-height:500px;background:#080810;color:#e2e8f0;font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px}

  /* Header */
  .hdr{background:linear-gradient(135deg,#0f0f1e,#1a1a2e);padding:14px 16px 12px;border-bottom:1px solid #1e2035;display:flex;align-items:center;gap:10px}
  .hdr-icon{font-size:20px}
  .hdr-title{font-size:14px;font-weight:700;color:#fff}
  .hdr-sub{font-size:10px;color:#374151;margin-top:1px}
  .hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center}
  .hdr-btn{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd;font-size:10px;padding:4px 8px;border-radius:5px;cursor:pointer;font-family:inherit}
  .hdr-btn:hover{background:rgba(59,130,246,0.2)}
  .toggle-wrap{display:flex;align-items:center;gap:5px;font-size:10px;color:#4b5563}
  .toggle{position:relative;width:32px;height:17px;cursor:pointer}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:#1e2035;border-radius:17px;transition:.2s}
  .toggle-slider:before{content:'';position:absolute;width:13px;height:13px;left:2px;bottom:2px;background:#4b5563;border-radius:50%;transition:.2s}
  input:checked+.toggle-slider{background:#3b82f6}
  input:checked+.toggle-slider:before{transform:translateX(15px);background:#fff}

  /* Score */
  .score-wrap{padding:18px 16px 14px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #0f0f1e}
  .ring-wrap{position:relative;width:76px;height:76px;flex-shrink:0}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:#1e2035;stroke-width:7}
  .ring-fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .6s,stroke .4s}
  .ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;font-weight:800;line-height:1}
  .ring-sub{font-size:8px;color:#4b5563;font-weight:500;margin-top:1px}
  .score-meta{flex:1;min-width:0}
  .score-site{font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px;margin-bottom:3px}

  /* Plain English verdict */
  .verdict{font-size:12px;line-height:1.5;margin-bottom:8px;padding:8px 10px;border-radius:7px;border-left:3px solid}
  .verdict.red{background:rgba(239,68,68,0.08);border-color:#ef4444;color:#fca5a5}
  .verdict.amber{background:rgba(245,158,11,0.08);border-color:#f59e0b;color:#fde68a}
  .verdict.green{background:rgba(34,197,94,0.08);border-color:#22c55e;color:#86efac}

  /* Traffic light */
  .traffic{display:flex;gap:5px;margin-bottom:6px}
  .tl{width:12px;height:12px;border-radius:50%;opacity:0.2}
  .tl.on{opacity:1}
  .tl-r{background:#ef4444}.tl-a{background:#f59e0b}.tl-g{background:#22c55e}

  /* Pills */
  .pills{display:flex;gap:5px;flex-wrap:wrap}
  .pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
  .pill-red{background:rgba(239,68,68,0.15);color:#fca5a5}
  .pill-amber{background:rgba(245,158,11,0.15);color:#fde68a}
  .pill-purple{background:rgba(168,85,247,0.15);color:#d8b4fe}
  .pill-blue{background:rgba(59,130,246,0.15);color:#93c5fd}
  .pill-green{background:rgba(34,197,94,0.15);color:#86efac}
  .pill-gray{background:rgba(100,116,139,0.15);color:#94a3b8}

  /* Sections */
  .section{border-bottom:1px solid #0a0a12}
  .sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;cursor:pointer;user-select:none}
  .sec-hdr:hover{background:rgba(255,255,255,0.02)}
  .sec-title{font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.06em;text-transform:uppercase}
  .sec-right{display:flex;align-items:center;gap:6px}
  .sec-arrow{font-size:10px;color:#374151;transition:transform .2s}
  .section.open .sec-arrow{transform:rotate(180deg)}
  .sec-body{display:none;padding:0 16px 10px}
  .section.open .sec-body{display:block}

  /* Finding rows */
  .f-row{padding:7px 0;border-bottom:1px solid #0a0a12;font-size:11px}
  .f-row:last-child{border-bottom:none}
  .f-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .f-name{color:#cbd5e1;font-weight:600}
  .f-badges{display:flex;gap:4px;align-items:center}
  /* Plain English explanation */
  .f-explain{font-size:11px;color:#4b5563;line-height:1.5;margin-bottom:6px;display:none}
  .plain-english .f-explain{display:block}
  /* Dark pattern message — always visible */
  .f-dp-msg{font-size:11px;color:#94a3b8;line-height:1.5;margin-bottom:4px}
  /* Dev mode meta */
  .f-meta{font-size:10px;color:#374151;display:flex;gap:6px}
  .plain-english .f-meta{display:none}

  /* Action buttons */
  .f-actions{display:flex;gap:5px;margin-top:5px}
  .act-btn{font-size:10px;padding:4px 9px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid;transition:background .15s}
  .btn-block{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:#fca5a5}
  .btn-block:hover{background:rgba(239,68,68,0.2)}
  .btn-block.blocked{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25);color:#86efac}
  .btn-cookies{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);color:#fde68a}
  .btn-cookies:hover{background:rgba(245,158,11,0.2)}
  .btn-cookies:disabled{opacity:.4;cursor:not-allowed}

  /* Disclaimer banner */
  .disclaimer{margin:8px 0 4px;padding:7px 9px;background:rgba(100,116,139,0.08);border:1px solid rgba(100,116,139,0.15);border-radius:6px;font-size:10px;color:#374151;line-height:1.5}
  .disclaimer strong{color:#4b5563}

  .empty{color:#2d3748;font-size:11px;font-style:italic;padding:4px 0}

  /* Cookie section */
  .cookie-sec{padding:10px 16px 12px;border-bottom:1px solid #0a0a12}
  .cookie-title{font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .cookie-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .cookie-btns{display:flex;gap:5px}
  .c-btn{font-size:10px;padding:5px 9px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid}
  .c-btn-b{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.25);color:#93c5fd}
  .c-btn-b:hover{background:rgba(59,130,246,0.2)}
  .c-btn-a{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:#fca5a5}
  .c-btn-a:hover{background:rgba(239,68,68,0.2)}
  .c-btn-a:disabled{opacity:.4;cursor:not-allowed}
  .cookie-help{font-size:10px;color:#1f2937;line-height:1.4}

  /* Footer */
  .footer{padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
  .footer-note{font-size:10px;color:#1f2937}
  .clear-btn{font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:inherit;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#4b5563}
  .clear-btn:hover{color:#fca5a5}
  .loading{padding:40px 16px;text-align:center;color:#2d3748;font-size:12px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">🛡️</div>
  <div>
    <div class="hdr-title">Privacy Monitor</div>
    <div class="hdr-sub">India Edition · DPDPA 2023</div>
  </div>
  <div class="hdr-right">
    <div class="toggle-wrap">
      <span id="modeLabel">Dev</span>
      <label class="toggle">
        <input type="checkbox" id="modeToggle">
        <span class="toggle-slider"></span>
      </label>
      <span>Plain</span>
    </div>
    <button class="hdr-btn" id="historyBtn">📊 History</button>
  </div>
</div>
<div id="main"><div class="loading">Loading…</div></div>
<script src="popup.js"></script>
</body>
</html>
