<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Monitor</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 360px;
    min-height: 480px;
    background: #080810;
    color: #e2e8f0;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
    padding: 16px 16px 12px;
    border-bottom: 1px solid #1e2035;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon { font-size: 22px; }
  .header-title { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .header-sub { font-size: 10px; color: #4b5563; margin-top: 1px; }
  .header-right { margin-left: auto; text-align: right; }
  .history-btn {
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    color: #93c5fd;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
  }
  .history-btn:hover { background: rgba(59,130,246,0.18); }

  /* ── Score Ring ── */
  .score-section {
    padding: 20px 16px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #111120;
  }
  .score-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .score-ring-wrap svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: #1e2035; stroke-width: 7; }
  .score-ring-fg { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease, stroke 0.4s; }
  .score-number {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; line-height: 1;
  }
  .score-label { font-size: 8px; color: #4b5563; font-weight: 500; margin-top: 2px; letter-spacing: 0.05em; }
  .score-meta { flex: 1; }
  .score-site { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .score-grade { font-size: 11px; margin-bottom: 8px; }
  .score-grade.A { color: #22c55e; }
  .score-grade.B { color: #86efac; }
  .score-grade.C { color: #f59e0b; }
  .score-grade.D { color: #ef4444; }
  .score-grade.F { color: #a855f7; }
  .score-counts { display: flex; gap: 8px; flex-wrap: wrap; }
  .score-count-pill {
    font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
  }
  .pill-red    { background: rgba(239,68,68,0.15);  color: #fca5a5; }
  .pill-amber  { background: rgba(245,158,11,0.15); color: #fde68a; }
  .pill-blue   { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .pill-purple { background: rgba(168,85,247,0.15); color: #d8b4fe; }
  .pill-green  { background: rgba(34,197,94,0.15);  color: #86efac; }
  .pill-gray   { background: rgba(100,116,139,0.15);color: #94a3b8; }

  /* ── Sections ── */
  .sections { padding: 8px 0; }
  .section { border-bottom: 1px solid #0f0f1e; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 16px; cursor: pointer; user-select: none;
  }
  .section-header:hover { background: rgba(255,255,255,0.02); }
  .section-title { font-size: 11px; font-weight: 600; color: #94a3b8; letter-spacing: 0.06em; text-transform: uppercase; }
  .section-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
  .section-arrow { font-size: 10px; color: #4b5563; margin-left: 6px; transition: transform 0.2s; }
  .section.open .section-arrow { transform: rotate(180deg); }
  .section-body { display: none; padding: 0 16px 10px; }
  .section.open .section-body { display: block; }

  .finding-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid #0d0d18; font-size: 11px;
  }
  .finding-row:last-child { border-bottom: none; }
  .finding-name { color: #94a3b8; flex: 1; }
  .finding-meta { font-size: 10px; color: #4b5563; margin: 0 6px; }
  .empty { color: #2d3748; font-size: 11px; font-style: italic; padding: 4px 0; }

  /* ── Cookie Audit ── */
  .cookie-section { padding: 10px 16px 12px; border-bottom: 1px solid #0f0f1e; }
  .cookie-title { font-size: 11px; font-weight: 600; color: #94a3b8; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .cookie-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cookie-verdict { font-size: 11px; }
  .cookie-btns { display: flex; gap: 6px; }
  .cookie-btn {
    font-size: 10px; padding: 5px 9px; border-radius: 5px; cursor: pointer;
    font-family: inherit; border: 1px solid; font-weight: 600;
  }
  .btn-baseline {
    background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.25); color: #93c5fd;
  }
  .btn-baseline:hover { background: rgba(59,130,246,0.18); }
  .btn-audit {
    background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #fca5a5;
  }
  .btn-audit:hover { background: rgba(239,68,68,0.18); }
  .btn-audit:disabled { opacity: 0.4; cursor: not-allowed; }
  .cookie-help { font-size: 10px; color: #374151; line-height: 1.4; }

  /* ── Footer ── */
  .footer { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .footer-note { font-size: 10px; color: #1f2937; }
  .clear-btn {
    font-size: 10px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
    font-family: inherit; background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.15); color: #6b7280;
  }
  .clear-btn:hover { color: #fca5a5; border-color: rgba(239,68,68,0.3); }

  .loading { padding: 40px 16px; text-align: center; color: #2d3748; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">🛡️</div>
  <div>
    <div class="header-title">Privacy Monitor</div>
    <div class="header-sub">India Edition · DPDPA 2023</div>
  </div>
  <div class="header-right">
    <button class="history-btn" id="historyBtn">📊 History</button>
  </div>
</div>

<div id="main">
  <div class="loading">Loading…</div>
</div>

<script src="popup.js"></script>
</body>
</html>
