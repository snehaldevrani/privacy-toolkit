<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Privacy Monitor — History</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07070f;color:#e2e8f0;font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px;min-height:100vh}

  .top{background:linear-gradient(135deg,#0f0f1e,#1a1a2e);border-bottom:1px solid #1e2035;padding:20px 32px;display:flex;align-items:center;gap:16px}
  .top-icon{font-size:28px}
  .top-title{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.4px}
  .top-sub{font-size:11px;color:#374151;margin-top:2px}
  .top-right{margin-left:auto;display:flex;gap:8px}
  .btn{font-size:11px;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid}
  .btn-danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:#fca5a5}
  .btn-danger:hover{background:rgba(239,68,68,0.2)}

  /* Stats bar */
  .stats-bar{display:flex;border-bottom:1px solid #111120}
  .stat{flex:1;padding:16px 20px;border-right:1px solid #111120;text-align:center}
  .stat:last-child{border-right:none}
  .stat-num{font-size:26px;font-weight:800;line-height:1}
  .stat-label{font-size:10px;color:#374151;margin-top:3px;letter-spacing:.05em;text-transform:uppercase}

  /* Cross-site tracker banner — THE KEY FEATURE */
  .cross-site-section{padding:20px 32px;border-bottom:1px solid #111120;background:rgba(239,68,68,0.04)}
  .cross-title{font-size:12px;font-weight:700;color:#6b7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
  .cross-empty{font-size:13px;color:#2d3748;font-style:italic;padding:8px 0}
  .cross-card{background:#0d0d18;border:1px solid #1e2035;border-radius:10px;padding:14px 16px;margin-bottom:8px}
  .cross-card:last-child{margin-bottom:0}
  .cross-card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .cross-tracker-name{font-size:14px;font-weight:700;color:#e2e8f0;flex:1}
  .cross-count-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;background:rgba(239,68,68,0.15);color:#fca5a5}
  .cross-headline{font-size:13px;color:#fde68a;line-height:1.5;margin-bottom:8px;font-weight:500}
  .cross-sites{display:flex;gap:6px;flex-wrap:wrap}
  .cross-site-pill{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(100,116,139,0.15);color:#94a3b8}
  .cross-block-btn{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid rgba(239,68,68,0.25);background:rgba(239,68,68,0.1);color:#fca5a5;margin-top:10px}
  .cross-block-btn:hover{background:rgba(239,68,68,0.2)}
  .cross-block-btn.blocked{border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.1);color:#86efac}

  /* Filters */
  .filters{padding:12px 32px;display:flex;gap:8px;border-bottom:1px solid #0f0f1e;flex-wrap:wrap}
  .filter-btn{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;border:1px solid #1e2035;background:transparent;color:#4b5563}
  .filter-btn.active{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:#93c5fd}
  .search{margin-left:auto;background:#0d0d18;border:1px solid #1e2035;border-radius:6px;color:#e2e8f0;font-family:inherit;font-size:11px;padding:5px 10px;outline:none;width:180px}
  .search:focus{border-color:#3b82f6}

  /* Site grid */
  .sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1px;background:#0f0f1e}
  .site-card{background:#080810;padding:16px;cursor:pointer;transition:background .15s}
  .site-card:hover{background:#0d0d1a}
  .site-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .score-badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;border:2px solid}
  .site-name{font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:195px}
  .site-date{font-size:10px;color:#2d3748;margin-top:1px}
  .site-pills{display:flex;gap:5px;flex-wrap:wrap}
  .pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
  .pill-red{background:rgba(239,68,68,0.15);color:#fca5a5}
  .pill-amber{background:rgba(245,158,11,0.15);color:#fde68a}
  .pill-purple{background:rgba(168,85,247,0.15);color:#d8b4fe}
  .pill-blue{background:rgba(59,130,246,0.15);color:#93c5fd}
  .pill-green{background:rgba(34,197,94,0.15);color:#86efac}
  .pill-gray{background:rgba(100,116,139,0.15);color:#94a3b8}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#0d0d18;border:1px solid #1e2035;border-radius:14px;width:500px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
  .modal-head{padding:16px 20px;border-bottom:1px solid #1e2035;display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:15px;font-weight:700;color:#fff}
  .modal-close{background:none;border:none;color:#4b5563;font-size:18px;cursor:pointer;line-height:1}
  .modal-close:hover{color:#9ca3af}
  .modal-body{overflow-y:auto;padding:16px 20px;flex:1}
  .modal-score-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #1e2035}
  .modal-score-num{font-size:36px;font-weight:800}
  .finding-group{margin-bottom:14px}
  .fg-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#374151;margin-bottom:6px}
  .fi{padding:6px 0;border-bottom:1px solid #0d0d18;display:flex;justify-content:space-between;align-items:flex-start;font-size:11px;gap:8px}
  .fi:last-child{border-bottom:none}
  .fi-left{color:#94a3b8;flex:1}
  .fi-explain{font-size:10px;color:#374151;margin-top:2px;line-height:1.4}

  .empty-state{padding:60px 32px;text-align:center;color:#1f2937;grid-column:1/-1}
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:.3}
</style>
</head>
<body>

<div class="top">
  <div class="top-icon">🛡️</div>
  <div>
    <div class="top-title">Privacy History</div>
    <div class="top-sub">Cross-site tracking analysis · DPDPA 2023 · India Edition</div>
  </div>
  <div class="top-right">
    <button class="btn btn-danger" id="clearAllBtn">🗑 Clear All</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="statSites">—</div><div class="stat-label">Sites Visited</div></div>
  <div class="stat"><div class="stat-num" id="statTrackers" style="color:#ef4444">—</div><div class="stat-label">Total Trackers</div></div>
  <div class="stat"><div class="stat-num" id="statCross" style="color:#a855f7">—</div><div class="stat-label">Cross-Site</div></div>
  <div class="stat"><div class="stat-num" id="statAvg">—</div><div class="stat-label">Avg Score</div></div>
</div>

<!-- CROSS-SITE TRACKER SECTION -->
<div class="cross-site-section">
  <div class="cross-title">👁️ Who followed you across sites</div>
  <div id="crossSiteContent"><div class="cross-empty">Visit 3+ sites to see cross-site tracking analysis.</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="risky">Risky (&lt;60)</button>
  <button class="filter-btn" data-filter="trackers">Has Trackers</button>
  <button class="filter-btn" data-filter="leaks">Has Leaks</button>
  <button class="filter-btn" data-filter="darkpatterns">Dark Patterns</button>
  <input class="search" id="searchBox" placeholder="Search sites..." type="text">
</div>

<div class="sites-grid" id="sitesGrid">
  <div class="empty-state"><div class="empty-icon">🛡️</div><div>Loading…</div></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">Site Details</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="history.js"></script>
</body>
</html>
